<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusNest</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#6366f1;
--bg:#f9fafb;
--text:#111827;
}

body{margin:0;font-family:'Poppins',sans-serif;background:var(--bg);} 

header{display:flex;justify-content:space-between;padding:1.5rem 2rem;background:white;box-shadow:0 5px 15px rgba(0,0,0,0.05);} 
.logo{font-weight:600;color:var(--primary);font-size:1.4rem;} 

.hero{text-align:center;padding:2rem;} 
.hero h2{margin-bottom:10px;} 
input{padding:0.8rem;border-radius:8px;border:1px solid #ddd;width:80%;max-width:400px;} 

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;padding:2rem;} 

.card{background:white;padding:1.5rem;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.05);transition:0.3s;} 
.card:hover{transform:translateY(-6px);} 

.tag{background:#eef2ff;padding:4px 8px;border-radius:6px;margin:2px;display:inline-block;font-size:12px;} 

.rating{color:#f59e0b;font-weight:600;} 

button{margin-top:10px;padding:0.6rem 1rem;border:none;border-radius:8px;background:var(--primary);color:white;cursor:pointer;} 

.auth{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.5);} 

.auth-box{background:white;padding:2rem;border-radius:12px;width:300px;} 
.auth-box input{width:100%;margin:6px 0;} 

.badge{display:inline-block;padding:4px 8px;border-radius:6px;font-size:12px;margin-top:5px;} 
.available{background:#d1fae5;color:#065f46;} 
.full{background:#fee2e2;color:#991b1b;} 
</style>
</head>

<body>

<header>
<div class="logo">CampusNest</div>
<button onclick="openAuth()">Login</button>
</header>

<section class="hero">
<h2>Find Verified PGs & Hostels in Pune</h2>
<input type="text" id="search" placeholder="Search by college (COEP, MIT-WPU...)">
</section>

<section class="grid" id="listings"></section>

<div class="auth" id="authBox">
<div class="auth-box">
<h3>Login / Signup</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="googleLogin()">Google Login</button>
<p id="error" style="color:red;font-size:12px;"></p>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAP0jIeaCY7jdcmwfJpPyR1EjXFqSV3bVs",
  authDomain: "campusnest-26b05.firebaseapp.com",
  projectId: "campusnest-26b05"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function openAuth(){document.getElementById('authBox').style.display='flex';}

function signup(){
if(password.value.length < 6){error.innerText = "Password must be at least 6 characters"; return;}

auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>alert('Account created'))
.catch(e=>error.innerText=e.message);
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>alert('Logged in'))
.catch(e=>error.innerText=e.message);
}

function googleLogin(){
const provider = new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}

function loadListings(){
db.collection("properties").onSnapshot(snapshot=>{
let html="";

snapshot.forEach(doc=>{
const p = doc.data();

html += `
<div class='card'>
<h3>${p.name}</h3>
<p><b>₹${p.price}/month</b></p>
<p>${p.distance} from ${p.college}</p>
<p class='rating'>⭐ ${p.rating}</p>

<div>
${p.amenities.map(a=>`<span class='tag'>${a}</span>`).join('')}
</div>

<div class='badge ${p.available ? 'available' : 'full'}'>
${p.available ? 'Available' : 'Full'}
</div>

<button onclick='alert("Contact coming soon")'>Contact</button>
</div>`;
});

document.getElementById('listings').innerHTML = html;
});
}

loadListings();
</script>

</body>
</html>
