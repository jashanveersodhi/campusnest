<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusNest</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f9fafb;color:#111827;overflow-x:hidden;}

header{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 2rem;background:white;box-shadow:0 5px 15px rgba(0,0,0,0.05);} 
.logo{font-weight:600;color:#6366f1;font-size:1.4rem;} 

.hero{text-align:center;padding:3rem 1rem;animation:fadeIn 1s ease;} 
.hero h2{font-size:2rem;margin-bottom:10px;}
.hero input{padding:0.9rem;border-radius:10px;border:1px solid #ddd;width:80%;max-width:420px;transition:0.3s;}
.hero input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.2);} 

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.8rem;padding:2rem;} 

.card{background:white;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,0.05);overflow:hidden;transition:0.3s;animation:fadeUp 0.6s ease;} 
.card:hover{transform:translateY(-8px) scale(1.01);} 
.card img{width:100%;height:180px;object-fit:cover;} 
.card-content{padding:1rem;} 

.tag{background:#eef2ff;padding:4px 8px;border-radius:6px;margin:2px;display:inline-block;font-size:12px;} 
.rating{color:#f59e0b;font-weight:600;} 

button{margin-top:10px;padding:0.6rem 1rem;border:none;border-radius:10px;background:#6366f1;color:white;cursor:pointer;transition:0.3s;} 
button:hover{background:#4f46e5;}

.auth{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);} 

.auth-box{background:white;padding:2rem;border-radius:16px;width:320px;position:relative;animation:popIn 0.4s ease;} 
.auth-box h3{text-align:center;margin-bottom:1rem;} 
.auth-box input{width:100%;margin:8px 0;padding:0.7rem;border-radius:8px;border:1px solid #ddd;} 

.close-btn{position:absolute;top:10px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;} 

.badge{display:inline-block;padding:4px 8px;border-radius:6px;font-size:12px;margin-top:5px;} 
.available{background:#d1fae5;color:#065f46;} 
.full{background:#fee2e2;color:#991b1b;} 

@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
@keyframes popIn{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}

</style>
</head>

<body>

<header>
<div class="logo">CampusNest</div>
<button onclick="openAuth()">Login</button>
</header>

<section class="hero">
<h2>Find Verified PGs & Hostels in Pune</h2>
<input type="text" placeholder="Search by college...">
</section>

<section class="grid" id="listings"></section>

<div class="auth" id="authBox">
<div class="auth-box">
<button class="close-btn" onclick="closeAuth()">✖</button>
<h3>Welcome Back</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Create Account</button>
<button onclick="login()">Login</button>
<button onclick="googleLogin()">Continue with Google</button>
<p id="error" style="color:red;font-size:12px;text-align:center;"></p>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAP0jIeaCY7jdcmwfJpPyR1EjXFqSV3bVs",
  authDomain: "campusnest-26b05.firebaseapp.com",
  projectId: "campusnest-26b05"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function openAuth(){document.getElementById('authBox').style.display='flex';}
function closeAuth(){document.getElementById('authBox').style.display='none';}

window.onclick = function(e){
  const box = document.getElementById('authBox');
  if(e.target === box){box.style.display='none';}
}

function signup(){
if(password.value.length < 6){error.innerText = "Password must be 6+ chars"; return;}

auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>alert('Account created'))
.catch(e=>error.innerText=e.message);
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>alert('Logged in'))
.catch(e=>error.innerText=e.message);
}

function googleLogin(){
const provider = new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}

function loadListings(){
db.collection("properties").onSnapshot(snapshot=>{
let html="";

snapshot.forEach(doc=>{
const p = doc.data();

html += `
<div class='card'>
<img src='${p.image || "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2"}'>
<div class='card-content'>
<h3>${p.name}</h3>
<p><b>₹${p.price}/month</b></p>
<p>${p.distance} from ${p.college}</p>
<p class='rating'>⭐ ${p.rating}</p>
<div>${p.amenities.map(a=>`<span class='tag'>${a}</span>`).join('')}</div>
<div class='badge ${p.available ? 'available' : 'full'}'>${p.available ? 'Available' : 'Full'}</div>
<button onclick='alert("Contact coming soon")'>Contact</button>
</div>
</div>`;
});

document.getElementById('listings').innerHTML = html;
});
}

loadListings();
</script>

</body>
</html>
