<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusNest</title>
  <style>
    :root {
      --primary: #4f46e5;
      --bg: #f9fafb;
      --text: #1f2937;
      --card: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      color: var(--primary);
    }

    header p {
      margin-top: 0.5rem;
      color: #6b7280;
    }

    .search-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
      flex-wrap: wrap;
    }

    input, select {
      padding: 0.8rem;
      border-radius: 8px;
      border: 1px solid #ddd;
      min-width: 200px;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 0.5rem;
    }

    .price {
      color: var(--primary);
      font-weight: bold;
      margin: 0.5rem 0;
    }

    .amenities {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 1rem;
    }

    button {
      padding: 0.6rem 1rem;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>CampusNest</h1>
  <p>Find affordable student housing near your campus</p>
</header>

<section class="search-bar">
  <input type="text" id="searchInput" placeholder="Search by college or location">
</section>

<section class="filters">
  <select id="priceFilter">
    <option value="">All Prices</option>
    <option value="5000">Below ₹5000</option>
    <option value="10000">Below ₹10000</option>
  </select>

  <select id="typeFilter">
    <option value="">All Types</option>
    <option value="Single">Single Room</option>
    <option value="Shared">Shared Room</option>
  </select>
</section>

<section class="grid" id="listings"></section>

<script>
  const properties = [
    { name: "GreenView PG", price: 4500, distance: "0.5 km", type: "Shared", amenities: "WiFi, Food" },
    { name: "Urban Stay Hostel", price: 8000, distance: "1 km", type: "Single", amenities: "WiFi, AC" },
    { name: "Campus Comfort", price: 6000, distance: "0.8 km", type: "Shared", amenities: "Food, Laundry" },
    { name: "Elite Rooms", price: 12000, distance: "1.5 km", type: "Single", amenities: "WiFi, AC, Food" },
    { name: "Budget Nest", price: 4000, distance: "1.2 km", type: "Shared", amenities: "WiFi" },
    { name: "Scholars Hub", price: 9000, distance: "0.7 km", type: "Single", amenities: "WiFi, Food, AC" }
  ];

  const container = document.getElementById("listings");

  function renderListings(data) {
    container.innerHTML = "";
    data.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>${p.name}</h3>
        <p class="price">₹${p.price}/month</p>
        <p>${p.distance} from college</p>
        <p class="amenities">${p.amenities}</p>
        <button onclick="contact()">Contact</button>
      `;
      container.appendChild(card);
    });
  }

  function contact() {
    alert("Contact coming soon");
  }

  function applyFilters() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const price = document.getElementById("priceFilter").value;
    const type = document.getElementById("typeFilter").value;

    let filtered = properties.filter(p => {
      return (
        p.name.toLowerCase().includes(search) &&
        (price === "" || p.price <= price) &&
        (type === "" || p.type === type)
      );
    });

    renderListings(filtered);
  }

  document.getElementById("searchInput").addEventListener("input", applyFilters);
  document.getElementById("priceFilter").addEventListener("change", applyFilters);
  document.getElementById("typeFilter").addEventListener("change", applyFilters);

  renderListings(properties);
</script>

</body>
</html>
